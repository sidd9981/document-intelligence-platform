name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/ -v -m "not eval and not integration" --tb=short

  integration-tests:
    name: Integration tests + RAGAS gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: finsight
          POSTGRES_USER: finsight
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pull Ollama models
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2:3b
          ollama pull nomic-embed-text

      - name: Run migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: finsight
          POSTGRES_USER: finsight
          POSTGRES_PASSWORD: changeme
        run: python scripts/migrate.py

      - name: Seed tenants
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: finsight
          POSTGRES_USER: finsight
          POSTGRES_PASSWORD: changeme
        run: python scripts/seed_tenants.py

      - name: Ingest test document
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: finsight
          POSTGRES_USER: finsight
          POSTGRES_PASSWORD: changeme
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          OLLAMA_BASE_URL: http://localhost:11434/v1
          EMBEDDING_MODEL: nomic-embed-text
          EMBEDDING_DIM: "768"
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
          APP_ENV: development
        run: python scripts/ingest_test_doc.py

      - name: Run RAGAS gate
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: finsight
          POSTGRES_USER: finsight
          POSTGRES_PASSWORD: changeme
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          OLLAMA_BASE_URL: http://localhost:11434/v1
          OLLAMA_MODEL: llama3.2:3b
          EMBEDDING_MODEL: nomic-embed-text
          EMBEDDING_DIM: "768"
          REDIS_URL: redis://localhost:6379
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
          APP_ENV: development
        run: pytest tests/eval/test_ragas_gate.py -v -m eval

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/finsight-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/finsight-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max